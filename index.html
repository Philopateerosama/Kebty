                    <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">

                        <p class="mb-4 text-gray-700">توضع علامة تشبه الشرطة فوق الكلمة المختصرة، وعادة تُستخدم للكلمات المقدسة:</p>

                                <span class="coptic-text text-2xl block mb-2">ⲓ̅ⲥ̅</span>
                                <span class="text-sm font-bold bg-yellow-100 px-2 rounded text-darkText">إيسوس</span>

                            </div>
                            <div class="p-3 bg-gray-50 rounded border border-gray-200 hover:border-copticGold transition">
                                <span class="coptic-text text-2xl block mb-2">ⲉⲑ̅ⲩ̅</span>
                                <span class="text-sm font-bold bg-yellow-100 px-2 rounded text-darkText">إثؤواب</span>
                                <p class="text-xs text-gray-500 mt-1 font-bold">مقدس/قديس (ⲉⲑⲟⲩⲁⲃ)</p>

                            <div class="p-3 bg-gray-50 rounded border border-gray-200 hover:border-copticGold transition">

                            </div>
                        </div>
                    </div>
                `
            },
            {
                id: 4,
                title: "الأسبوع الرابع",
                subtitle: "الإضافة، روابط الكينونة، والضمائر (ص 27، 32، 48)",
                icon: "fa-link",
                content: `
                    <div class="bg-white rounded-xl shadow-md p-6 mb-6 border border-gray-100">
                        <h2 class="text-2xl font-bold text-copticRed mb-4 border-b pb-2"><i class="fa-solid fa-plus-minus ml-2"></i>أدوات الإضافة (Genitive)</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="p-4 bg-gray-50 rounded border text-right">
                                <span class="coptic-text text-2xl block mb-2">ⲛ̀ⲧⲉ</span>
                                <p>أداة إضافة منفصلة (تأتي بين كلمتين).</p>
                                <p class="text-sm mt-2 text-gray-600">مثال: <span class="coptic-text">ⲡⲓⲱⲓⲕ ⲛ̀ⲧⲉ ⲡⲱⲛϧ</span> (خبز الحياة)</p>
                            </div>
                            <div class="p-4 bg-gray-50 rounded border text-right">
                                <span class="coptic-text text-2xl block mb-2">ⲛ̀ أو ⲙ̀</span>
                                <p>أداة إضافة متصلة (تلتصق بالكلمة الثانية).</p>
                                <p class="text-sm mt-2 text-gray-600">نستخدم ⲙ̀ قبل حروف الشفتين (ⲃ, ⲙ, ⲡ, ⲫ, ⲯ)</p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-md p-6 mb-6 border border-gray-100">
                        <h2 class="text-2xl font-bold text-copticRed mb-4 border-b pb-2"><i class="fa-solid fa-equals ml-2"></i>روابط الكينونة (Verb to be)</h2>
                        <ul class="list-disc list-inside space-y-3">
                            <li><span class="coptic-text mx-2 text-xl">ⲡⲉ</span> للمفرد المذكر (هو / يكون)</li>
                            <li><span class="coptic-text mx-2 text-xl">ⲧⲉ</span> للمفرد المؤنث (هي / تكون)</li>
                            <li><span class="coptic-text mx-2 text-xl">ⲛⲉ</span> للجمع بنوعيه (هم / يكونون)</li>
                        </ul>
                    </div>

                    <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
                        <h2 class="text-2xl font-bold text-copticRed mb-4 border-b pb-2"><i class="fa-solid fa-users ml-2"></i>الضمائر الشخصية المنفصلة</h2>
                        <div class="overflow-x-auto">
                            <table class="w-full text-center border-collapse">
                                <thead>
                                    <tr class="bg-copticRed text-white">
                                        <th class="p-3">المعنى</th>
                                        <th class="p-3">الضمير (قبطي)</th>
                                        <th class="p-3">النطق</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr class="border-b bg-gray-50"><td>أنا</td><td class="coptic-text coptic-large">ⲁⲛⲟⲕ</td><td>أنوك</td></tr>
                                    <tr class="border-b"><td>أنتَ (مذكر)</td><td class="coptic-text coptic-large">ⲛ̀ⲑⲟⲕ</td><td>إنثوك</td></tr>
                                    <tr class="border-b bg-gray-50"><td>أنتِ (مؤنث)</td><td class="coptic-text coptic-large">ⲛ̀ⲑⲟ</td><td>إنثو</td></tr>
                                    <tr class="border-b"><td>هو</td><td class="coptic-text coptic-large">ⲛ̀ⲑⲟϥ</td><td>إنثوف</td></tr>
                                    <tr class="border-b bg-gray-50"><td>هي</td><td class="coptic-text coptic-large">ⲛ̀ⲑⲟⲥ</td><td>إنثوس</td></tr>
                                    <tr class="border-b"><td>نحن</td><td class="coptic-text coptic-large">ⲁⲛⲟⲛ</td><td>أنون</td></tr>
                                    <tr class="border-b bg-gray-50"><td>أنتم</td><td class="coptic-text coptic-large">ⲛ̀ⲑⲱⲧⲉⲛ</td><td>إنثوتين</td></tr>
                                    <tr class="border-b"><td>هم</td><td class="coptic-text coptic-large">ⲛ̀ⲑⲱⲟⲩ</td><td>إنثوؤو</td></tr>

                    </div>
                `
            },
            {
                id: 5,
                title: "الأسبوع الخامس",
                subtitle: "المقاطع والجِنكم (ص 16)",
                icon: "fa-pen-nib",
                content: `
                    <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
                        <h2 class="text-2xl font-bold text-copticRed mb-4 border-b pb-2"><i class="fa-solid fa-quote-right ml-2"></i>علامة الجنكم ( ̀ )</h2>
                        <p class="mb-4 text-lg">الجنكم عبارة عن نقطة أو شرطة صغيرة مائلة توضع فوق الحرف، ولها تأثيران حسب نوع الحرف الذي توضع عليه:</p>
                        
                        <div class="space-y-6 mt-6">
                            <div class="bg-gray-50 p-5 rounded-lg border-r-4 border-copticGold">
                                <h3 class="font-bold text-xl mb-2">1. إذا وُضعت على حرف ساكن:</h3>
                                <p>تُشكل مقطعاً صوتياً مستقلاً يُنطق كحرف (إي <span class="coptic-text">ⲉ</span>) قبل الحرف الساكن المكسور.</p>
                                <p class="mt-2 text-copticRed">مثال: <span class="coptic-text font-bold text-2xl mx-2">ⲙ̀ⲡⲉ</span> تُنطق (إم-بي).</p>
                            </div>

                            <div class="bg-gray-50 p-5 rounded-lg border-r-4 border-copticRed">
                                <h3 class="font-bold text-xl mb-2">2. إذا وُضعت على حرف متحرك:</h3>
                                <p>تُفيد استقلال نُطق هذا الحرف المتحرك عن الحروف التي تسبقه أو تليه، كأنها "همزة قطع".</p>
                                <p class="mt-2 text-copticRed">مثال: <span class="coptic-text font-bold text-2xl mx-2">ⲱⲟⲩ</span> بدون جنكم = (أوو) <br> بينما <span class="coptic-text font-bold text-2xl mx-2">ⲱ̀ⲟⲩ</span> بجنكم = (أو - أوو).</p>
                            </div>
                        </div>
                    </div>
                `
            }
        ];

        // --- App Logic ---
        const mainContainer = document.getElementById('main-container');
        const homeBtn = document.getElementById('homeBtn');

        // توليد لوحة الحروف لربط كل كارت بالصفحة الخاصة به
        function getAlphabetBoardHTML() {
            let gridHTML = '<div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-3">';
            lettersData.forEach((letter, index) => {
                let borderClass = letter.type.includes("متحرك") ? "border-b-4 border-copticGold" : (letter.origin === "ديموطيقي" ? "bg-red-50 border-copticRed border-b-4" : "border-b-4 border-gray-200");
                gridHTML += `
                    <div onclick="showLetterDetails(${index})" class="letter-card ${borderClass} cursor-pointer hover:bg-gray-100 transition transform active:scale-95">
                        <span class="coptic-text coptic-large">${letter.char}</span>
                        <span class="font-bold mt-1 text-sm">${letter.name}</span>
                        <span class="text-xs text-gray-500">${letter.summary}</span>
                    </div>
                `;
            });
            gridHTML += '</div>';

            return `
                <div class="bg-white rounded-xl shadow-md p-6 mb-6 border border-gray-100">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center border-b pb-4 mb-6">
                        <h2 class="text-2xl font-bold text-copticRed"><i class="fa-solid fa-table-cells ml-2"></i>الحروف القبطية (32 حرف)</h2>
                        <span class="mt-2 md:mt-0 text-sm font-bold text-white bg-copticGold px-4 py-2 rounded-full shadow animate-pulse"><i class="fa-solid fa-hand-pointer ml-2"></i>اضغط على أي حرف لتعلم قواعده ونطقه</span>
                    </div>
                    ${gridHTML}
                    <div class="mt-6 flex flex-wrap gap-4 text-xs justify-center items-center bg-gray-50 p-4 rounded-lg border">
                        <span class="flex items-center gap-1"><div class="w-3 h-3 bg-copticGold rounded-full"></div> حروف متحركة</span>
                        <span class="flex items-center gap-1"><div class="w-3 h-3 bg-red-100 border border-copticRed rounded-full"></div> حروف ديموطيقية</span>
                        <span class="flex items-center gap-1"><div class="w-3 h-3 bg-gray-200 rounded-full"></div> حروف ساكنة</span>
                    </div>
                </div>
            `;
        }
        
        // حقن المحتوى داخل بيانات الأسبوع 0 (مقدمة الكورس) بالبحث عن الـ ID وليس الترتيب
        const introWeek = courseData.find(week => week.id === 0);
        if (introWeek) {
            introWeek.content = getAlphabetBoardHTML();
        }

        // دالة عرض تفاصيل وقواعد الحرف عند الضغط عليه
        function showLetterDetails(index) {
            const letter = lettersData[index];
            homeBtn.classList.remove('hidden');
            
            let rulesHTML = '';
            letter.rules.forEach((rule, rIdx) => {
                let examplesHTML = '';
                rule.examples.forEach(ex => {
                    examplesHTML += `
                        <div class="bg-gray-50 p-4 rounded-lg border-2 border-gray-100 flex flex-col items-center justify-center text-center transition hover:border-copticGold">
                            <span class="coptic-text text-3xl mb-2 text-copticRed">${ex.coptic}</span>
                            <span class="font-bold text-darkText bg-yellow-100 px-3 py-1 rounded-full text-sm mb-2">${ex.arabic}</span>
                            <span class="text-sm font-semibold text-gray-500">${ex.meaning}</span>
                        </div>
                    `;
                });

                rulesHTML += `
                    <div class="mb-8 ${rIdx !== letter.rules.length - 1 ? 'border-b pb-8' : ''}">
                        <div class="flex items-start gap-3 mb-4 bg-red-50 p-4 rounded-lg border border-red-100">
                            <i class="fa-solid fa-lightbulb text-copticGold text-xl mt-1"></i>
                            <div>
                                <h4 class="text-lg font-bold text-darkText">${rule.condition}</h4>
                            </div>
                        </div>
                        <h5 class="text-sm font-bold text-gray-500 mb-3"><i class="fa-solid fa-list ml-1"></i> أمثلة للتوضيح:</h5>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            ${examplesHTML}
                        </div>
                    </div>
                `;
            });

            let html = `
                <div class="fade-in">
                    <div class="mb-6 flex justify-between items-center border-b-2 border-copticGold pb-4">
                        <div class="flex items-center gap-4">
                            <div class="w-20 h-20 bg-copticRed text-white rounded-2xl flex justify-center items-center text-5xl coptic-text shadow-lg border-4 border-copticGold">
                                ${letter.char}
                            </div>
                            <div>
                                <h2 class="text-3xl font-bold text-copticRed">${letter.name} <span class="text-gray-400 text-lg font-normal">(${letter.summary})</span></h2>
                                <div class="flex flex-wrap gap-2 mt-2">
                                    <span class="bg-gray-100 text-xs font-bold px-3 py-1 rounded-full text-gray-700">${letter.type}</span>
                                    <span class="bg-gray-100 text-xs font-bold px-3 py-1 rounded-full text-gray-700">أصل ${letter.origin}</span>
                                </div>
                            </div>
                        </div>
                        <button onclick="renderLesson(0)" class="bg-gray-100 hover:bg-gray-200 text-gray-800 p-3 rounded-full flex justify-center items-center h-12 w-12 transition text-xl shadow-sm border border-gray-200" title="العودة للوحة الحروف">
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                    <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100">
                        ${rulesHTML}
                    </div>
                </div>
            `;
            mainContainer.innerHTML = html;
            window.scrollTo(0,0);
        }

        function renderHome() {
            homeBtn.classList.add('hidden');
            let html = `
                <div class="text-center mb-10 fade-in">
                    <h2 class="text-3xl md:text-4xl font-bold text-copticRed mb-3">مرحباً بك في الكورس</h2>
                    <p class="text-gray-600 max-w-xl mx-auto mb-2">منهج كورس الصيف 2025.</p>
                    <p class="text-sm font-semibold text-copticGold bg-copticRed inline-block px-4 py-1 rounded-full">يرجى البدء بمقدمة الكورس لحفظ الحروف أولاً</p>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            `;
            
            courseData.forEach(week => {
                // تمييز الكروت بناءً على نوعها
                const isPrayer = week.id === -1;
                const isIntro = week.id === 0;
                
                let bgClass = 'bg-white border-gray-100 border';
                let textClass = 'text-darkText';
                let iconColorClass = 'text-copticGold';
                let headerBgClass = 'bg-copticRed';
                let badgeText = 'ابدأ المذاكرة';

                if (isPrayer) {
                    bgClass = 'bg-red-50 border-copticRed border-2';
                    textClass = 'text-copticRed';
                    iconColorClass = 'text-white';
                    headerBgClass = 'bg-copticRed';
                    badgeText = 'اقرأ وصلي';
                } else if (isIntro) {
                    bgClass = 'bg-parchment border-copticGold border-2';
                    textClass = 'text-copticRed';
                    iconColorClass = 'text-copticRed';
                    headerBgClass = 'bg-copticGold';
                    badgeText = 'ابدأ الحفظ الآن';
                }

                html += `
                    <div onclick="renderLesson(${week.id})" class="lesson-card ${bgClass} rounded-2xl shadow-lg overflow-hidden cursor-pointer flex flex-col h-full fade-in" style="animation-delay: ${(week.id + 1) * 0.05}s">
                        <div class="${headerBgClass} ${iconColorClass} p-4 flex justify-center items-center transition-colors">
                            <i class="fa-solid ${week.icon} text-4xl opacity-90"></i>
                        </div>
                        <div class="p-5 flex-grow text-center">
                            <h3 class="text-xl font-bold ${textClass} mb-2">${week.title}</h3>
                            <p class="text-sm text-gray-600">${week.subtitle}</p>
                        </div>
                        <div class="bg-gray-50 p-3 text-center border-t text-sm font-semibold text-copticRed">
                            ${badgeText} <i class="fa-solid fa-arrow-left ml-1 text-xs"></i>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            mainContainer.innerHTML = html;
        }

        function renderLesson(id) {
            homeBtn.classList.remove('hidden');
            const lesson = courseData.find(l => l.id === id);
            
            let html = `
                <div class="fade-in">
                    <div class="mb-6 flex justify-between items-center border-b-2 border-copticGold pb-4">
                        <div>
                            <h2 class="text-3xl font-bold text-copticRed">${lesson.title}</h2>
                            <p class="text-gray-600 mt-1">${lesson.subtitle}</p>
                        </div>
                        <button onclick="goHome()" class="bg-gray-100 hover:bg-gray-200 text-gray-800 p-2 rounded-full h-10 w-10 flex items-center justify-center transition">
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                    <div>
                        ${lesson.content}
                    </div>
                </div>
            `;
            mainContainer.innerHTML = html;
            window.scrollTo(0,0);
        }

        function goHome() {
            renderHome();
            window.scrollTo(0,0);
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            renderHome();
        });
    </script>
</body>
</html>
